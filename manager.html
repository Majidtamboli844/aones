<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Invoice & Challan Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="logo.png">
<style>
:root{
    --primary:#0b3c5d;
    --light:#eef3f7;
    --border:#d1d5db;
}

body{
    font-family:"Segoe UI",Arial,sans-serif;
    background:#f4f6f8;
    margin:0;
    padding:20px;
}

.header{
    background:var(--primary);
    color:#fff;
    padding:15px 20px;
    border-radius:8px;
    margin-bottom:20px;
}

.header h1{
    margin:0;
    font-size:22px;
}

.controls{
    display:flex;
    gap:10px;
    margin-top:10px;
    flex-wrap:wrap;
}

.controls input{
    padding:6px;
    border-radius:4px;
    border:none;
    min-width:200px;
}

.section{
    background:#fff;
    padding:15px;
    border-radius:8px;
    margin-bottom:25px;
    box-shadow:0 6px 15px rgba(0,0,0,.08);
}

.section h2{
    margin:0 0 10px;
    color:var(--primary);
    font-size:18px;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
}

th,td{
    border:1px solid var(--border);
    padding:8px;
    text-align:center;
}

th{
    background:var(--light);
    font-weight:600;
}

tr:hover{
    background:#f9fbfd;
}

button{
    padding:5px 10px;
    margin:2px;
    background:var(--primary);
    color:#fff;
    border:none;
    border-radius:4px;
    cursor:pointer;
    font-size:12px;
}

button.delete{
    background:#b91c1c;
}

.empty{
    text-align:center;
    color:#666;
    padding:15px;
}
</style>
</head>

<body>

<div class="controls">
    <button onclick="newInvoice()">➕ New Invoice</button>
    <button onclick="newChallan()">➕ New Challan</button>

    <input id="searchName" placeholder="🔍 Search Customer Name" oninput="refresh()">
    <input type="date" id="filterDate" onchange="refresh()">
</div>

<div class="section">
    <h2>📄 Tax Invoices</h2>
    <div id="invoiceBox"></div>
</div>

<div class="section">
    <h2>📦 Delivery Challans</h2>
    <div id="challanBox"></div>
</div>

<script>
function getData(key){
    return JSON.parse(localStorage.getItem(key)) || [];
}

function refresh(){
    render("invoices","invoiceBox");
    render("challans","challanBox");
}

function render(type,boxId){
    let data = getData(type);
    if(!data.length){
        document.getElementById(boxId).innerHTML="<div class='empty'>No records</div>";
        return;
    }

    let html=`<table>
    <tr><th>Date</th><th>No</th><th>Name</th><th>Total</th><th>Action</th></tr>`;

    data.forEach((d,i)=>{
        html+=`<tr>
            <td>${d.date||""}</td>
            <td>${d.no}</td>
            <td>${d.customer.name}</td>
            <td>${d.total}</td>
            <td>
                <button onclick="openDoc('${type}',${i})">Open</button>
                <button onclick="editDoc('${type}',${i})">Edit</button>
                <button class="delete" onclick="deleteDoc('${type}',${i})">Delete</button>
            </td>
        </tr>`;
    });

    document.getElementById(boxId).innerHTML=html+"</table>";
}

function openDoc(type,index){
    localStorage.setItem("editDoc",JSON.stringify({type,index}));
    window.open("invoice.html","_blank");
}

function editDoc(type,index){
    localStorage.setItem("editDoc",JSON.stringify({type,index}));
    window.open("invoice.html","_blank");
}

function deleteDoc(type,index){
    if(!confirm("Delete record?")) return;
    let data=getData(type);
    data.splice(index,1);
    localStorage.setItem(type,JSON.stringify(data));
    refresh();
}

function newInvoice(){
    localStorage.removeItem("editDoc");
    localStorage.removeItem("viewDoc");
    window.open("invoice.html","_blank");
}

function newChallan(){
    localStorage.removeItem("editDoc");
    localStorage.removeItem("viewDoc");
    window.open("invoice.html","_blank");
}

fetch("api/get_docs.php")
.then(res => res.json())
.then(data => {
    console.log(data); // render table here
});

refresh();
</script>


</body>
</html>
